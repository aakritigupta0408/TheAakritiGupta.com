## Render deployment — manages both the static website and the Python AI backend.
## Docs: https://render.com/docs/render-yaml-spec

services:
  # ── Static React SPA ──────────────────────────────────────────────────────
  - type: static
    name: theaakritigupta-web
    buildCommand: npm ci && npm run build:client
    staticPublishPath: dist/spa
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # SPA fallback — all paths return index.html
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Vedic Astrology AI — Python / Gradio ─────────────────────────────────
  - type: web
    name: vedic-astro-ai
    runtime: docker
    dockerfilePath: ./python-service/Dockerfile
    # "starter" plan ($7/mo) never sleeps. Use "free" for testing (sleeps after 15 min).
    plan: starter
    healthCheckPath: /
    envVars:
      # Set these in the Render dashboard → Environment, or via render CLI secrets.
      # Do NOT hardcode values here.
      - key: ANTHROPIC_API_KEY
        sync: false          # pull from Render secret store
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENCAGE_API_KEY
        sync: false
      # LLM backend — "anthropic" for production, "hf_inference" for free tier
      - key: LLM_BACKEND
        value: anthropic
      - key: ENVIRONMENT
        value: production
