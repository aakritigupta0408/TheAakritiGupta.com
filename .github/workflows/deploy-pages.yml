name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Verify build toolchain
        run: npm ls vite framer-motion --depth=0

      - name: Build client
        run: |
          set -o pipefail
          npm run build:client 2>&1 | tee /tmp/build-client.log

      - name: Surface build failure details
        if: failure()
        run: |
          if [ ! -f /tmp/build-client.log ]; then
            echo "::error::Build failed before the log file was created."
            exit 0
          fi

          tail -n 80 /tmp/build-client.log > /tmp/build-client-tail.log

          while IFS= read -r line; do
            safe_line="${line//'%'/'%25'}"
            safe_line="${safe_line//$'\r'/'%0D'}"
            safe_line="${safe_line//$'\n'/'%0A'}"
            echo "::error::$safe_line"
          done < /tmp/build-client-tail.log

      - name: Prepare GitHub Pages artifacts
        run: |
          cp CNAME dist/spa/CNAME
          cp dist/spa/index.html dist/spa/404.html
          touch dist/spa/.nojekyll

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist/spa
