name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        # Render auto-deploys on push when the repo is connected, but this
        # explicit hook ensures the deploy fires even if auto-deploy is off.
        # Set RENDER_DEPLOY_HOOK_URL in repo Settings → Secrets → Actions.
        if: ${{ vars.RENDER_DEPLOY_HOOK_URL != '' || secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --data '{"clearCache": false}'
